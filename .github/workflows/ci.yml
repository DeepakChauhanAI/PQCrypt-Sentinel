name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: black --check .
      - run: mypy .

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/ --cov=app --cov-fail-under=80

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config > /dev/null

  security-gates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pip-audit --strict --requirement requirements.txt \
          --ignore-vuln GHSA-cq46-m9x9-j8w2 \
          --ignore-vuln CVE-2026-44405 \
          --ignore-vuln CVE-2025-68616 \
          --ignore-vuln CVE-2026-30922 \
          --ignore-vuln PYSEC-2026-161 \
          --ignore-vuln PYSEC-2026-249 \
          --ignore-vuln PYSEC-2026-248 \
          --ignore-vuln CVE-2024-47874 \
          --ignore-vuln CVE-2025-54121 \
          --ignore-vuln CVE-2026-48818 \
          --ignore-vuln CVE-2026-48817 \
          --ignore-vuln GHSA-537c-gmf6-5ccf
      - run: bandit -r app -ll
